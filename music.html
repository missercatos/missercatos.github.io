<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐 - Misser-catos</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/img/avatar.png">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="preload">

    <!-- 全屏数码雨 Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <!-- 右上角音乐控制 -->
    <div class="music-control">
        <button id="playPauseBtn" aria-label="播放/暂停">⏸/▶</button>
        <button id="nextTrackBtn" aria-label="下一首">▽</button>
        <button id="muteBtn" aria-label="静音/取消静音">◆</button>
        <span id="nowPlaying">未播放</span>
    </div>

    <!-- 左上角点赞 + 跳转留言板 -->
    <div class="top-left-actions">
        <div class="mini-like-container">
            <button id="likeButton" class="mini-like-btn" title="点赞">
                <i class="fas fa-heart"></i> <span id="likeCount">0</span>
            </button>
        </div>
        <a href="us.html" class="mini-us-btn" title="留言板">
            <i class="fas fa-comment-dots"></i>
        </a>
    </div>

    <!-- 主内容容器 (毛玻璃效果) -->
    <main id="mainContent" class="hidden">
        <!-- 导航栏 - 简化版，只保留Logo -->
        <nav class="acid-nav">
            <a href="index.html" class="nav-logo">MISSER</a>
        </nav>

        <!-- 英雄区域 -->
        <header class="hero">
            <div class="avatar-container polygon-shape-rotate">
                <img src="assets/img/avatar.jpg" alt="Miser 的头像" class="avatar">
            </div>
            
            <!-- 头像下方的社交链接 -->
            <div class="social-icons">
                <a href="https://github.com/missercatos?tab=repositories" target="_blank" class="social-icon polygon-shape" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://space.bilibili.com/1783752730" target="_blank" class="social-icon polygon-shape" title="哔哩哔哩">
                    <i class="fab fa-bilibili"></i>
                </a>
            </div>
            
            <h1 class="acid-title glitch" data-text="音乐">音乐</h1>
            
            <!-- 网站功能链接（原导航链接移到此处） -->
            <div class="function-links">
                <a href="projects.html" class="func-link polygon-shape"><i class="fas fa-code"></i> Projects</a>
                <a href="music.html" class="func-link polygon-shape"><i class="fas fa-music"></i> Music</a>
                <a href="game.html" class="func-link polygon-shape"><i class="fas fa-gamepad"></i> Game</a>
                <a href="about.html" class="func-link polygon-shape"><i class="fas fa-book"></i> Learning</a>
            </div>
        </header>

        <!-- 音乐内容 -->
        <section class="content-section">
            <h2 class="section-title">音乐收藏</h2>
            <div class="music-list">
                <div class="music-card" data-src="assets/music/track1.mp3" data-title="不存在的乐园" data-artist="塞壬唱片">
                    <span class="music-number">001</span>
                    <button class="music-play-btn"><i class="fas fa-play"></i> 播放</button>
                    <div class="music-info">不存在的乐园 / 塞壬唱片</div>
                    <a href="assets/music/track1.mp3" download="不存在的乐园.mp3" class="music-download-btn"><i class="fas fa-download"></i> 下载</a>
                </div>
                <div class="music-card" data-src="assets/music/track2.mp3" data-title="****生息****" data-artist="塞壬唱片">
                    <span class="music-number">002</span>
                    <button class="music-play-btn"><i class="fas fa-play"></i> 播放</button>
                    <div class="music-info">****生息**** / 塞壬唱片</div>
                    <a href="assets/music/track2.mp3" download="生息.mp3" class="music-download-btn"><i class="fas fa-download"></i> 下载</a>
                </div>
                <div class="music-card" data-src="assets/music/track3.mp3" data-title="走过漫漫时空" data-artist="塞壬唱片">
                    <span class="music-number">003</span>
                    <button class="music-play-btn"><i class="fas fa-play"></i> 播放</button>
                    <div class="music-info">走过漫漫时空 / 塞壬唱片</div>
                    <a href="assets/music/track3.mp3" download="走过漫漫时空.mp3" class="music-download-btn"><i class="fas fa-download"></i> 下载</a>
                </div>
                <div class="music-card" data-src="assets/music/我的生活.mp3" data-title="我的生活" data-artist="塞壬唱片">
                    <span class="music-number">004</span>
                    <button class="music-play-btn"><i class="fas fa-play"></i> 播放</button>
                    <div class="music-info">我的生活/ 塞壬唱片</div>
                    <a href="assets/music/我的生活.mp3" download="我的生活.mp3" class="music-download-btn"><i class="fas fa-download"></i> 下载</a>
                </div>
                <div class="music-card" data-src="assets/music/永恒呼吸.mp3" data-title="永恒呼吸" data-artist="塞壬唱片">
                    <span class="music-number">005</span>
                    <button class="music-play-btn"><i class="fas fa-play"></i> 播放</button>
                    <div class="music-info">永恒呼吸 / 塞壬唱片</div>
                    <a href="assets/music/永恒呼吸.mp3" download="永恒呼吸.mp3" class="music-download-btn"><i class="fas fa-download"></i> 下载</a>
                </div>
            </div>
        </section>

        <footer>
            <!-- 页脚内容 -->
        </footer>
    </main>

    <!-- 隐藏的音频播放器（全局BGM） -->
    <audio id="bgmPlayer" loop preload="auto">
        <!-- 音源由JS动态设置 -->
    </audio>

    <!-- 音乐卡片独立播放器 -->
    <audio id="musicCardPlayer" preload="auto"></audio>

    <!-- 脚本引入 -->
    <script src="assets/js/cmatrix.js"></script>
    <script src="assets/js/musicPlayer.js"></script>
    <script src="assets/js/musicCards.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
