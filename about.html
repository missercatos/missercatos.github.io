<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术分享 - Misser-catos</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/img/avatar.png">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="preload">

    <!-- 全屏数码雨 Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <!-- 右上角音乐控制 -->
    <div class="music-control">
        <button id="playPauseBtn" aria-label="播放/暂停">⏸/▶</button>
        <button id="nextTrackBtn" aria-label="下一首">▽</button>
        <button id="volDownBtn" aria-label="音量减小" title="音量 −">−</button>
        <button id="volUpBtn" aria-label="音量增大" title="音量 +">+</button>
        <button id="downloadBtn" aria-label="下载当前歌曲" title="下载 MP3">⬇</button>
        <button id="playlistBtn" aria-label="播放列表" title="展开目录">☰</button>
        <button id="muteBtn" aria-label="静音/取消静音">◆</button>
        <span id="nowPlaying">未播放</span>
        <div id="playlistDropdown" class="playlist-dropdown hidden"></div>
    </div>

    <!-- 左上角点赞 + 跳转留言板 -->
    <div class="top-left-actions">
        <a href="index.html" class="mini-home-btn" title="回到主页">
            <i class="fas fa-home"></i>
        </a>
        <div class="mini-like-container">
            <button id="likeButton" class="mini-like-btn" title="点赞">
                <i class="fas fa-heart"></i> <span id="likeCount">0</span>
            </button>
        </div>
        <a href="us.html" class="mini-us-btn" title="留言板">
            <i class="fas fa-comment-dots"></i>
        </a>
    </div>

    <!-- 主内容容器 (毛玻璃效果) -->
    <main id="mainContent" class="hidden">
        <!-- 导航栏 - 简化版，只保留Logo -->
        <nav class="acid-nav">
            <a href="index.html" class="nav-logo">MISSER</a>
        </nav>

        <!-- 英雄区域 -->
        <header class="hero">
            <div class="avatar-container polygon-shape-rotate">
                <img src="assets/img/avatar.jpg" alt="Miser 的头像" class="avatar">
            </div>
            
            <!-- 头像下方的社交链接 -->
            <div class="social-icons">
                <a href="https://github.com/missercatos?tab=repositories" target="_blank" class="social-icon polygon-shape" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://space.bilibili.com/1783752730" target="_blank" class="social-icon polygon-shape" title="哔哩哔哩">
                    <i class="fab fa-bilibili"></i>
                </a>
            </div>
            
            <h1 class="acid-title glitch" data-text="技术分享">技术分享</h1>
            
            <!-- 网站功能链接（原导航链接移到此处） -->
            <div class="function-links">
                <a href="projects.html" class="func-link polygon-shape"><i class="fas fa-code"></i> Projects</a>
                <a href="music.html" class="func-link polygon-shape"><i class="fas fa-music"></i> Music</a>
                <a href="game.html" class="func-link polygon-shape"><i class="fas fa-gamepad"></i> Game</a>
                <a href="about.html" class="func-link polygon-shape"><i class="fas fa-share-alt"></i> Tech Share</a>
            </div>
        </header>

        <!-- 技术分享浮动网格 -->
        <section class="floating-share-section">
            <h2 class="section-title">技术分享</h2>
            <div class="floating-share-container" id="floatingShareContainer">
                <!-- JS动态生成浮动分享按钮 -->
            </div>
            <!-- ★ 添加新技术分享页面后，在 main.js 的 TECH_SHARES 数组中追加条目即可 -->
        </section>

        <footer>
            <!-- 页脚内容 -->
        </footer>
    </main>

    <!-- 隐藏的音频播放器 -->
    <audio id="bgmPlayer" loop preload="auto">
        <!-- 音源由JS动态设置 -->
    </audio>

    <!-- 脚本引入 -->
    <script src="assets/js/cmatrix.js"></script>
    <script src="assets/js/musicPlayer.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
